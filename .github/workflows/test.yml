name: Test

on:
  pull_request: { branches: [master] }
  push: { branches: [master] }
  workflow_call: # callable so Publish can gate releases on a green suite

# No `concurrency` here: when Publish calls this via workflow_call, `github.workflow`
# resolves to the caller ("Publish"), so a shared group would deadlock caller vs callee.

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ts
        with: { install-bun: "true" }
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
