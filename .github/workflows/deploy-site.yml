name: Deploy Site
on: { push: { branches: [master, vitepress] }, workflow_dispatch: }
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: false }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - { uses: ./.github/actions/setup-ts, with: { install-bun: true } }
      - run: bun install --frozen-lockfile
      - run: bun --bun site:build
      - { uses: actions/upload-pages-artifact@v4, with: { path: site/.vitepress/dist } }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    steps: [{ name: Deploy to GitHub Pages, id: deployment, uses: actions/deploy-pages@v4 }]
